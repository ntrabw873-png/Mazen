name: Build APK Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Packing Project
        run: |
          zip -r project_files.zip . -x "*.git*"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Mazen-App-Package
          path: project_files.zip
