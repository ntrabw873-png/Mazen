name: Build APK Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Android Release
        run: |
          npx react-native bundle --platform android --dev false --entry-file App.js --bundle-output index.android.bundle --assets-dest android/app/src/main/res
          echo "Build Process Started..."

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-app-apk
          path: index.android.bundle
